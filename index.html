    background-repeat: no-repeat;
    /* Subtle scale-in on load */
    animation: scaleIn 1.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
  }

  @keyframes scaleIn {
    from { transform: scale(1.06); opacity: 0.85; }
    to   { transform: scale(1);    opacity: 1; }
  }

  /* Very light gradient only at bottom so image text stays clear */
  .hero-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(13,10,9,0) 0%,
      rgba(13,10,9,0) 60%,
      rgba(13,10,9,0.55) 85%,
      rgba(13,10,9,0.85) 100%
    );
  }

  /* Buttons positioned above the "OPENING SOON" text baked into the image */
  .hero-cta {
    position: absolute;
    /* image text sits roughly bottom 22% — buttons go just above that */
    bottom: 28%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
    /* Fade + slide up on load */
    opacity: 0;
    animation: fadeUp 0.9s ease 1.2s forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateX(-50%) translateY(14px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  .btn {
    font-family: 'Cormorant SC', serif;
    font-size: 11px;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    text-decoration: none;
    padding: 13px 34px;
    cursor: none;
    display: inline-block;
    transition: all 0.3s ease;
    white-space: nowrap;
  }

  .btn-primary {
    background: rgba(139,32,32,0.88);
    color: #E8E0D4;
    border: 1px solid rgba(139,32,32,0.6);
    backdrop-filter: blur(6px);
  }
  .btn-primary:hover { background: #A83030; letter-spacing: 0.52em; }

  .btn-ghost {
    background: rgba(13,10,9,0.4);
    color: rgba(232,224,212,0.85);
    border: 1px solid rgba(232,224,212,0.28);
    backdrop-filter: blur(6px);
  }
  .btn-ghost:hover { border-color: rgba(232,224,212,0.65); color: #E8E0D4; }

  /* FOOTER */
  footer {
    padding: 44px 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid rgba(139,32,32,0.18);
    flex-wrap: wrap;
    gap: 20px;
    opacity: 0;
    animation: fadeUp 0.8s ease 2s forwards;
  }

  .footer-address p {
    font-size: 13px;
    font-style: italic;
    color: rgba(232,224,212,0.4);
    line-height: 1.8;
  }

  .footer-links {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
  }

  .footer-links a {
    font-family: 'Cormorant SC', serif;
    font-size: 10px;
    letter-spacing: 0.3em;
    color: rgba(232,224,212,0.38);
    text-decoration: none;
    text-transform: uppercase;
    transition: color 0.3s;
  }
  .footer-links a:hover { color: rgba(232,224,212,0.75); }

  /* MODAL */
  #modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(13,10,9,0.88);
    z-index: 2000;
    align-items: center;
    justify-content: center;
  }

  .modal-box {
    background: #150F0E;
    border: 1px solid rgba(139,32,32,0.28);
    padding: 52px 44px;
    max-width: 400px;
    width: 90%;
    text-align: center;
    position: relative;
    animation: modalIn 0.35s ease forwards;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .modal-close {
    position: absolute;
    top: 14px; right: 18px;
    background: none;
    border: none;
    color: rgba(232,224,212,0.3);
    font-size: 22px;
    cursor: none;
    font-family: 'Cormorant Garamond', serif;
    line-height: 1;
    transition: color 0.2s;
  }
  .modal-close:hover { color: rgba(232,224,212,0.65); }

  .modal-label {
    font-family: 'Cormorant SC', serif;
    font-size: 9px;
    letter-spacing: 0.5em;
    color: #8B2020;
    text-transform: uppercase;
    margin-bottom: 18px;
  }

  .modal-title {
    font-size: 26px;
    font-weight: 300;
    color: #E8E0D4;
    margin-bottom: 10px;
  }

  .modal-sub {
    font-size: 14px;
    font-style: italic;
    color: rgba(232,224,212,0.42);
    margin-bottom: 36px;
    line-height: 1.65;
  }

  .modal-input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(232,224,212,0.16);
    padding: 11px 0;
    color: #E8E0D4;
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    outline: none;
    margin-bottom: 28px;
    text-align: center;
    cursor: none;
    transition: border-color 0.3s;
  }
  .modal-input:focus { border-bottom-color: rgba(232,224,212,0.45); }
  .modal-input::placeholder { color: rgba(232,224,212,0.2); }

  .modal-submit {
    width: 100%;
    background: #8B2020;
    color: #E8E0D4;
    border: none;
    padding: 15px;
    font-family: 'Cormorant SC', serif;
    font-size: 11px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    cursor: none;
    transition: background 0.3s;
  }
  .modal-submit:hover { background: #A83030; }

  .modal-thanks { display: none; padding: 12px 0; }
  .modal-thanks p:first-child {
    font-size: 22px; font-weight: 300;
    font-style: italic; color: #E8E0D4; margin-bottom: 8px;
  }
  .modal-thanks p:last-child {
    font-size: 13px; font-style: italic;
    color: rgba(232,224,212,0.38);
  }

  /* MOBILE */
  @media (max-width: 600px) {
    .hero { min-height: 100svh; }

    /* On mobile the image is portrait — push buttons higher so they
       don't overlap the baked-in OPENING SOON text */
    .hero-cta {
      bottom: 26%;
      gap: 10px;
    }

    .btn {
      padding: 11px 24px;
      font-size: 10px;
      letter-spacing: 0.3em;
    }

    footer {
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 36px 24px;
    }

    .footer-links {
      align-items: center;
      flex-direction: row;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
    }

    .modal-box { padding: 44px 28px; }
  }

  /* Very tall / landscape desktop: keep image proportions */
  @media (min-aspect-ratio: 16/9) {
    .hero-bg {
      background-position: center center;
    }
    .hero-cta { bottom: 24%; }
  }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>

<!-- HERO -->
<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-cta">
    <a href="#" class="btn btn-primary" id="signup-btn">Sign Up</a>
    <a href="mailto:reservations@thirtynine.co.uk" class="btn btn-ghost">Book a Table</a>
  </div>
</section>

<!-- FOOTER -->
<footer>
  <div class="footer-address">
    <p>39 Maddox Street, Mayfair<br>London W1S 2PP</p>
  </div>
  <div class="footer-links">
    <a href="mailto:reservations@thirtynine.co.uk">reservations@thirtynine.co.uk</a>
    <a href="https://instagram.com" target="_blank">@thirtynine.london</a>
    <a href="https://maddoxclub.com" target="_blank">Maddox Club</a>
  </div>
</footer>

<!-- MAILING LIST MODAL -->
<div id="modal-overlay">
  <div class="modal-box">
    <button class="modal-close" id="modal-close">&times;</button>
    <p class="modal-label">Be First to Know</p>
    <h2 class="modal-title">THIRTY<em>nine</em></h2>
    <p class="modal-sub">Opening soon above Maddox, Mayfair.<br>Join the list for exclusive early access.</p>
    <div id="signup-form">
      <input type="email" id="email-input" class="modal-input" placeholder="your@email.com">
      <button class="modal-submit" onclick="submitEmail()">Join the List</button>
    </div>
    <div class="modal-thanks" id="signup-thanks">
      <p>Thank you.</p>
      <p>We'll be in touch.</p>
    </div>
  </div>
</div>

<script>
  // Cursor
  const cursor = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top  = e.clientY + 'px';
  });
  document.querySelectorAll('a, button').forEach(el => {
    el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
    el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
  });

  // Modal open
  document.getElementById('signup-btn').addEventListener('click', e => {
    e.preventDefault();
    const overlay = document.getElementById('modal-overlay');
    overlay.style.display = 'flex';
    // re-trigger animation
    const box = overlay.querySelector('.modal-box');
    box.style.animation = 'none';
    box.offsetHeight;
    box.style.animation = '';
  });

  // Modal close
  function closeModal() {
    document.getElementById('modal-overlay').style.display = 'none';
  }
  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  // Submit
  function submitEmail() {
    const val = document.getElementById('email-input').value.trim();
    const input = document.getElementById('email-input');
    if (!val || !val.includes('@') || !val.includes('.')) {
      input.style.borderBottomColor = '#8B2020';
      input.focus();
      setTimeout(() => input.style.borderBottomColor = '', 2000);
      return;
    }
    document.getElementById('signup-form').style.display  = 'none';
    document.getElementById('signup-thanks').style.display = 'block';
  }

  // Enter key in email field
  document.getElementById('email-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitEmail();
  });
</script>
</body>
</html>
